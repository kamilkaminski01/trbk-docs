/* ==========================================================================
   TRBK - Baza Wiedzy
   Design system: monochrom / grafit, premium, minimalistyczny
   Motyw jasny + ciemny. Brak zależności sieciowych (działa offline).
   ========================================================================== */

/* ----- Tokens ----------------------------------------------------------- */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;

  --sidebar-w: 290px;
  --toc-w: 232px;
  --content-max: 768px;
  --radius: 10px;
  --radius-sm: 8px;
  --radius-lg: 16px;

  --ease: cubic-bezier(.4, 0, .2, 1);
  --shadow-sm: 0 1px 2px rgba(16,16,18,.06), 0 1px 3px rgba(16,16,18,.04);
  --shadow-md: 0 4px 14px rgba(16,16,18,.08), 0 2px 6px rgba(16,16,18,.05);
  --shadow-lg: 0 18px 50px rgba(16,16,18,.18), 0 6px 18px rgba(16,16,18,.10);
}

/* Light (default) */
:root,
[data-theme="light"] {
  --bg: #ffffff;
  --bg-elev: #ffffff;
  --sidebar-bg: #fafafa;
  --surface: #f6f6f7;
  --surface-2: #f0f0f1;
  --hover: #f2f2f3;

  --border: #e8e8ea;
  --border-strong: #d9d9dc;

  --text: #1a1a1d;
  --text-2: #5c5c63;
  --text-3: #8a8a92;

  --accent: #18181b;          /* grafit / ink */
  --accent-soft: #2a2a2e;
  --on-accent: #ffffff;
  --accent-ring: rgba(24,24,27,.18);
  --accent-tint: #f1f1f2;

  --code-bg: #f4f4f5;
  --kbd-bg: #ffffff;

  /* Semantyczne callouty - zdesaturowane, premium */
  --info-bg: #f4f5f7;   --info-bd: #d8dbe0; --info-fg: #3f4654; --info-ic: #6b7280;
  --tip-bg: #f0f6f2;    --tip-bd: #cfe6d6;  --tip-fg: #2f5d40;  --tip-ic: #2f8f5b;
  --warn-bg: #fbf6ec;   --warn-bd: #f0e0c0; --warn-fg: #7a5a16; --warn-ic: #c4901f;
  --danger-bg: #fcf2f1; --danger-bd: #f3d6d3;--danger-fg: #8c3a33;--danger-ic: #cf4a3e;
  --success-bg:#eef7f0; --success-bd:#c9e6d2;--success-fg:#266140;--success-ic:#2f9e63;
}

/* Dark (graphite) */
[data-theme="dark"] {
  --bg: #0f0f10;
  --bg-elev: #161618;
  --sidebar-bg: #131315;
  --surface: #1a1a1d;
  --surface-2: #202024;
  --hover: #1e1e22;

  --border: #262629;
  --border-strong: #34343a;

  --text: #ededee;
  --text-2: #a4a4ad;
  --text-3: #74747d;

  --accent: #fafafa;          /* w ciemnym akcent = jasny */
  --accent-soft: #e4e4e7;
  --on-accent: #18181b;
  --accent-ring: rgba(250,250,250,.22);
  --accent-tint: #202024;

  --code-bg: #1c1c20;
  --kbd-bg: #202024;

  --info-bg: #181b20;   --info-bd: #2c313b; --info-fg: #c2c7d0; --info-ic: #9aa3b2;
  --tip-bg: #14201a;    --tip-bd: #244a34;  --tip-fg: #a7d8b8;  --tip-ic: #56bd81;
  --warn-bg: #221c10;   --warn-bd: #4a3c1c; --warn-fg: #e2c184; --warn-ic: #d6a740;
  --danger-bg: #231513; --danger-bd: #4d2a26;--danger-fg: #f0b3ac;--danger-ic: #e0685b;
  --success-bg:#13201a; --success-bd:#244a35;--success-fg:#9fdcb4;--success-ic:#46b377;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow-md: 0 6px 20px rgba(0,0,0,.5);
  --shadow-lg: 0 22px 60px rgba(0,0,0,.6);
}

/* ----- Reset ------------------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}
body {
  margin: 0;
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15.5px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
h1, h2, h3, h4 { line-height: 1.25; letter-spacing: -.01em; font-weight: 650; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--accent); color: var(--on-accent); }

/* Focus visibility */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}

/* Skip link */
.skip-link {
  position: fixed; left: 12px; top: -60px; z-index: 200;
  background: var(--accent); color: var(--on-accent);
  padding: 10px 16px; border-radius: var(--radius-sm);
  transition: top .18s var(--ease); font-weight: 600; font-size: 14px;
}
.skip-link:focus { top: 12px; }

/* Scrollbars */
* { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid transparent; background-clip: content-box; }
*::-webkit-scrollbar-thumb:hover { background: var(--text-3); background-clip: content-box; }

/* ==========================================================================
   Layout
   ========================================================================== */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
  min-height: 100vh;
}

/* ----- Sidebar ---------------------------------------------------------- */
.sidebar {
  grid-column: 1;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  /* Stały, niełamliwy układ - pozycja fixed eliminuje migotanie sticky
     przy przewijaniu (kolumna 1 gridu rezerwuje miejsce). */
  position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
  z-index: 60;
}
.sidebar__brand {
  display: flex; align-items: center; gap: 11px;
  padding: 18px 18px 14px;
  flex-shrink: 0;
}
.brand-mark {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--accent); color: var(--on-accent);
  display: grid; place-items: center;
  font-weight: 750; font-size: 15px; letter-spacing: .02em;
  flex-shrink: 0;
}
.brand-text { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
.brand-text strong { font-size: 15px; letter-spacing: -.01em; }
.brand-text span { font-size: 11.5px; color: var(--text-3); font-weight: 500; letter-spacing: .02em; text-transform: uppercase; }

.sidebar__search {
  margin: 2px 14px 10px;
  display: flex; align-items: center; gap: 9px;
  padding: 9px 11px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-3); font-size: 13.5px;
  transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
  width: calc(100% - 28px);
  text-align: left;
}
.sidebar__search:hover { border-color: var(--border-strong); }
.sidebar__search .kbd { margin-left: auto; }
.sidebar__search svg { flex-shrink: 0; }

.sidebar__nav {
  overflow-y: auto;
  padding: 4px 10px 28px;
  flex: 1;
  overscroll-behavior: contain;
}

/* Role block */
.nav-role { margin-bottom: 6px; }
.nav-role__head {
  display: flex; align-items: center; gap: 9px;
  width: 100%;
  padding: 9px 10px;
  border: none; background: transparent;
  color: var(--text); font-weight: 600; font-size: 13.5px;
  border-radius: var(--radius-sm);
  text-align: left;
}
.nav-role__head:hover { background: var(--hover); }
.nav-role__head .role-ic {
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--surface-2); color: var(--text-2);
  display: grid; place-items: center; flex-shrink: 0;
}
.nav-role__head .chev { margin-left: auto; color: var(--text-3); transition: transform .2s var(--ease); }
.nav-role[data-open="false"] .chev { transform: rotate(-90deg); }
.nav-role__head[disabled] { color: var(--text-3); cursor: default; }
.nav-role__head[disabled]:hover { background: transparent; }
.nav-role__badge {
  margin-left: auto; font-size: 10.5px; font-weight: 600;
  color: var(--text-3); background: var(--surface-2);
  padding: 2px 7px; border-radius: 99px; letter-spacing: .02em;
}

.nav-role__body { overflow: hidden; }
.nav-role[data-open="false"] .nav-role__body { display: none; }

.nav-group { margin: 2px 0 8px; }
.nav-group__label {
  font-size: 11px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: var(--text-3);
  padding: 10px 10px 5px 12px;
}
.nav-link {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px 7px 12px;
  margin: 1px 0;
  border-radius: var(--radius-sm);
  color: var(--text-2); font-size: 13.5px;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-link:hover { background: var(--hover); color: var(--text); }
.nav-link .dot { width: 5px; height: 5px; border-radius: 99px; background: var(--text-3); flex-shrink: 0; opacity: .55; }
.nav-link[aria-current="page"] {
  background: var(--accent-tint);
  color: var(--text);
  font-weight: 600;
  border-left-color: var(--accent);
}
.nav-link[aria-current="page"] .dot { background: var(--accent); opacity: 1; }

.sidebar__foot {
  flex-shrink: 0; padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11.5px; color: var(--text-3);
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}

/* ----- Main ------------------------------------------------------------- */
.main { grid-column: 2; display: flex; flex-direction: column; min-width: 0; }

.topbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 12px;
  padding: 11px 22px;
  /* Solidne tło zamiast backdrop-filter - eliminuje repaint/migotanie przy scrollu. */
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.topbar__crumbs { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-3); min-width: 0; }
.topbar__crumbs a:hover { color: var(--text); }
.topbar__crumbs .sep { opacity: .6; }
.topbar__crumbs .cur { color: var(--text-2); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar__spacer { flex: 1; }

.icon-btn {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-elev);
  color: var(--text-2); display: grid; place-items: center;
  transition: background .14s var(--ease), color .14s var(--ease), border-color .14s var(--ease);
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--hover); color: var(--text); border-color: var(--border-strong); }

.topbar__search {
  display: none; align-items: center; gap: 9px;
  padding: 8px 12px; min-width: 220px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-elev); color: var(--text-3); font-size: 13px;
}
.topbar__search:hover { border-color: var(--border-strong); }
.topbar__search .kbd { margin-left: auto; }

.hamburger { display: none; }

/* ----- Article ---------------------------------------------------------- */
.content-wrap {
  display: grid;
  grid-template-columns: minmax(0, 1fr) var(--toc-w);
  gap: 48px;
  max-width: 1180px;
  width: 100%;
  margin: 0 auto;
  padding: 40px 40px 96px;
}
.content-wrap.no-toc { grid-template-columns: minmax(0, 1fr); max-width: calc(var(--content-max) + 80px); }

.article { max-width: var(--content-max); min-width: 0; }
.article__eyebrow { font-size: 12.5px; font-weight: 650; color: var(--text-3); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 12px; }
.article__title { font-size: clamp(28px, 4vw, 38px); margin: 0 0 14px; font-weight: 720; }
.article__lead { font-size: 18px; color: var(--text-2); line-height: 1.6; margin: 0 0 22px; }
.article__meta {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px;
  padding: 13px 0 0; margin-bottom: 30px;
  border-top: 1px solid var(--border);
  font-size: 12.5px; color: var(--text-3);
}
.article__meta .m { display: inline-flex; align-items: center; gap: 6px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; flex-basis: 100%; margin-bottom: 2px; }
.tag {
  font-size: 11.5px; font-weight: 550; color: var(--text-2);
  background: var(--surface); border: 1px solid var(--border);
  padding: 3px 9px; border-radius: 99px;
}
.meta-print { margin-left: auto; }
.meta-print button {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--border); background: var(--bg-elev);
  color: var(--text-2); padding: 5px 11px; border-radius: 99px; font-size: 12.5px;
}
.meta-print button:hover { background: var(--hover); color: var(--text); }

/* Block typography */
.article :where(h2) { font-size: 22px; margin: 38px 0 14px; padding-top: 6px; scroll-margin-top: 84px; }
.article :where(h3) { font-size: 17px; margin: 26px 0 10px; scroll-margin-top: 84px; color: var(--text); }
.article p { margin: 0 0 15px; }
.article a.inline,
.article p a, .article li a, .block-lead a, .kv__v a, .step__body a,
.acc-panel a, .tab-panel a, .table-wrap a {
  color: var(--text); font-weight: 500;
  text-decoration: underline; text-decoration-color: var(--text-3);
  text-underline-offset: 2px; text-decoration-thickness: 1.5px;
  transition: text-decoration-color .15s, color .15s;
}
.article a.inline:hover,
.article p a:hover, .article li a:hover, .block-lead a:hover, .kv__v a:hover, .step__body a:hover,
.acc-panel a:hover, .tab-panel a:hover, .table-wrap a:hover {
  color: var(--accent); text-decoration-color: var(--accent); text-decoration-thickness: 2px;
}
.article strong { font-weight: 650; }
.article ul, .article ol { margin: 0 0 16px; padding-left: 22px; }
.article li { margin: 5px 0; }
.article li::marker { color: var(--text-3); }
.heading-anchor { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; background: none; border: none; padding: 2px; margin-left: 6px; border-radius: 5px; color: var(--text-3); opacity: 0; cursor: pointer; text-decoration: none; transition: opacity .14s, color .14s, background .14s; }
.article h2:hover .heading-anchor, .article h3:hover .heading-anchor, .heading-anchor:focus-visible { opacity: 1; }
.heading-anchor:hover { color: var(--text); background: var(--hover); }
@media (hover: none) { .heading-anchor { opacity: .45; } }

code:not(pre code) {
  font-family: var(--font-mono); font-size: .87em;
  background: var(--code-bg); padding: .12em .42em; border-radius: 5px;
  border: 1px solid var(--border);
}

/* Lead block */
.block-lead { font-size: 17.5px; color: var(--text-2); line-height: 1.62; margin: 0 0 22px; }

/* Key-value */
.kv { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 0 0 22px; }
.kv__row { display: grid; grid-template-columns: 190px 1fr; gap: 0; border-top: 1px solid var(--border); }
.kv__row:first-child { border-top: none; }
.kv__k { padding: 11px 16px; background: var(--surface); font-size: 13px; font-weight: 600; color: var(--text-2); }
.kv__v { padding: 11px 16px; font-size: 14px; }

/* Checklist */
.checklist { margin: 0 0 22px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.checklist__title { padding: 12px 16px; font-weight: 600; font-size: 13.5px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.checklist__progress { font-size: 12px; color: var(--text-3); font-weight: 600; }
.check-item { display: flex; align-items: flex-start; gap: 11px; padding: 10px 16px; border-top: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.check-item:first-child { border-top: none; }
.check-item:hover { background: var(--hover); }
.check-item input { position: absolute; opacity: 0; width: 0; height: 0; }
.check-box {
  width: 19px; height: 19px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
  border: 1.5px solid var(--border-strong); background: var(--bg-elev);
  display: grid; place-items: center; transition: all .14s var(--ease); color: transparent;
}
.check-item input:checked + .check-box { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
.check-item input:focus-visible + .check-box { outline: 2px solid var(--accent); outline-offset: 2px; }
.check-item__text { font-size: 14px; transition: color .14s, text-decoration-color .14s; }
.check-item input:checked ~ .check-item__text { color: var(--text-3); text-decoration: line-through; text-decoration-color: var(--text-3); }

/* Steps */
.steps { margin: 0 0 24px; position: relative; }
.step { display: grid; grid-template-columns: 34px 1fr; gap: 16px; padding-bottom: 22px; position: relative; }
.step:last-child { padding-bottom: 0; }
.step::before { content: ""; position: absolute; left: 16px; top: 34px; bottom: 0; width: 2px; background: var(--border); }
.step:last-child::before { display: none; }
.step__num {
  width: 34px; height: 34px; border-radius: 50%; z-index: 1;
  background: var(--accent); color: var(--on-accent);
  display: grid; place-items: center; font-weight: 650; font-size: 14px;
}
.step__body { padding-top: 4px; }
.step__title { font-weight: 650; font-size: 15.5px; margin: 0 0 4px; }
.step__body p:last-child { margin-bottom: 0; }

/* Callout / note */
.note {
  display: grid; grid-template-columns: 22px 1fr; gap: 13px;
  padding: 14px 16px; margin: 0 0 22px;
  border: 1px solid var(--info-bd); background: var(--info-bg);
  border-radius: var(--radius); color: var(--info-fg);
}
.note__ic { color: var(--info-ic); margin-top: 1px; }
.note__title { font-weight: 650; font-size: 14px; margin-bottom: 3px; color: inherit; }
.note__body { font-size: 14px; line-height: 1.58; }
.note__body :last-child { margin-bottom: 0; }
.note__body a { color: inherit; font-weight: 600; text-decoration: underline; text-decoration-color: currentColor; text-underline-offset: 2px; text-decoration-thickness: 1.5px; }
.note--tip { border-color: var(--tip-bd); background: var(--tip-bg); color: var(--tip-fg); } .note--tip .note__ic { color: var(--tip-ic); }
.note--warn { border-color: var(--warn-bd); background: var(--warn-bg); color: var(--warn-fg); } .note--warn .note__ic { color: var(--warn-ic); }
.note--danger { border-color: var(--danger-bd); background: var(--danger-bg); color: var(--danger-fg); } .note--danger .note__ic { color: var(--danger-ic); }
.note--success { border-color: var(--success-bd); background: var(--success-bg); color: var(--success-fg); } .note--success .note__ic { color: var(--success-ic); }

/* Table */
.table-wrap { margin: 0 0 24px; border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
table.tbl { border-collapse: collapse; width: 100%; font-size: 13.8px; }
table.tbl caption { text-align: left; font-size: 12.5px; color: var(--text-3); padding: 10px 14px 0; caption-side: bottom; }
table.tbl th, table.tbl td { padding: 11px 15px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
table.tbl thead th { background: var(--surface); font-weight: 650; font-size: 12.5px; letter-spacing: .02em; color: var(--text-2); white-space: nowrap; }
table.tbl tbody tr:last-child td { border-bottom: none; }
table.tbl tbody tr:hover { background: var(--hover); }

/* Accordion */
.accordion { margin: 0 0 22px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.acc-item { border-top: 1px solid var(--border); }
.acc-item:first-child { border-top: none; }
.acc-head {
  width: 100%; text-align: left; border: none; background: var(--bg-elev);
  padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  font-weight: 600; font-size: 14.5px; color: var(--text);
}
.acc-head:hover { background: var(--hover); }

/* Tabs */
.tabs { margin: 0 0 24px; }
.tabs__list { display: flex; gap: 4px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin: 0 0 24px; }
.card {

}

.card__ic { grid-column: 1; grid-row: 1; width: 32px; height: 32px; border-radius: 8px; background: var(--surface-2); color: var(--text-2); display: grid; place-items: center; flex-shrink: 0; }
.card__title { grid-column: 2; grid-row: 1; align-self: center; font-weight: 650; font-size: 14.5px; line-height: 1.3; }

.card__body { font-size: 13.3px; color: var(--text-2); line-height: 1.55; }

/* Media placeholders / image / video */
.media { margin: 0 0 24px; }
.media__frame {
  border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface);
}
.media__frame img { width: 100%; height: auto; display: block; }
.media__ph {
  border: 1.5px dashed var(--border-strong); border-radius: var(--radius);
  background: var(--surface); color: var(--text-3);
  display: grid; place-items: center; text-align: center;
  padding: 38px 20px; gap: 8px; min-height: 150px;
}
.media__ph .ph-ic { color: var(--text-3); }
.media__ph strong { color: var(--text-2); font-size: 14px; font-weight: 600; }
.media__ph span { font-size: 12.5px; max-width: 380px; }
.media__cap { font-size: 12.5px; color: var(--text-3); margin-top: 8px; text-align: center; }
.video-embed { position: relative; padding-bottom: 56.25%; height: 0; }
.video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

/* Files */
.files { display: flex; flex-direction: column; gap: 8px; margin: 0 0 24px; }
.file-item {
  display: flex; align-items: center; gap: 13px;
  padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-elev); transition: border-color .15s, background .15s;
}
.file-item:hover { border-color: var(--border-strong); background: var(--hover); }
.file-item__ic { width: 38px; height: 38px; border-radius: 8px; display: grid; place-items: center; background: var(--surface-2); color: var(--text-2); flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: .03em; }
.file-item__meta { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.file-item__name { font-weight: 600; font-size: 14px; line-height: 1.35; }
.file-item__note { display: block; font-size: 12.5px; color: var(--text-3); line-height: 1.4; }
.file-item__dl { color: var(--text-3); flex-shrink: 0; }

/* Links list */
.linklist { display: flex; flex-direction: column; gap: 6px; margin: 0 0 24px; }
.linklist a {
  display: flex; align-items: center; gap: 10px; padding: 10px 13px;
  border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-elev);
  font-size: 14px; transition: border-color .15s, background .15s;
}
.linklist a:hover { border-color: var(--border-strong); background: var(--hover); }
.linklist a .ll-note { color: var(--text-3); font-size: 12.5px; margin-left: auto; }
.linklist a .ll-ext { color: var(--text-3); }

/* Quote */
.quote { margin: 0 0 24px; padding: 4px 0 4px 20px; border-left: 3px solid var(--border-strong); color: var(--text-2); font-style: italic; }
.quote cite { display: block; margin-top: 8px; font-size: 12.5px; color: var(--text-3); font-style: normal; }

/* Divider */
.divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

/* Prev / next */
.prevnext { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 48px; padding-top: 28px; border-top: 1px solid var(--border); }
.prevnext a {
  display: flex; flex-direction: column; gap: 4px; padding: 15px 18px;
  border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev);
  transition: border-color .15s, background .15s;
}
.prevnext a:hover { border-color: var(--border-strong); background: var(--hover); }
.prevnext .pn-dir { font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
.prevnext .pn-title { font-weight: 600; font-size: 14.5px; }
.prevnext a.next { text-align: right; } .prevnext a.next .pn-dir { justify-content: flex-end; }
.prevnext .empty { visibility: hidden; }

/* ----- Table of contents ------------------------------------------------ */
.toc { position: sticky; top: 84px; align-self: start; max-height: calc(100vh - 110px); overflow-y: auto; }
.toc__label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; padding-left: 13px; }

.toc__list a.active { color: var(--text); border-left-color: var(--accent); font-weight: 600; }

.home__section-label { font-size: 12.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-3); margin: 0 0 16px; }

.quick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }

/* ==========================================================================

  /* ----- ToC + scroll spy ---------------------------------------------- */
  var spyObserver = null;
  function buildTOC() {
    var toc = $(".toc"), article = $(".article");
    if (!toc || !article) return;
    var heads = $all("h2[id], h3[id]", article);
    if (heads.length < 2) { toc.style.display = "none"; var cw = $(".content-wrap"); if (cw) cw.classList.add("no-toc"); return; }
    toc.innerHTML = '<div class="toc__label">Na tej stronie</div><ul class="toc__list">' +
      heads.map(function (h) {
        return '<li><a href="#' + (location.hash.split("#")[1] || "") + "#" + h.id + '" class="' + (h.tagName === "H3" ? "lvl-3" : "") + '" data-toc="' + h.id + '">' + escapeHtml(h.textContent.replace("#", "").trim()) + "</a></li>";
      }).join("") + "</ul>";

    $all("[data-toc]", toc).forEach(function (link) {
      link.addEventListener("click", function (e) {
        e.preventDefault();
        var el = document.getElementById(link.getAttribute("data-toc"));
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });

    if (spyObserver) spyObserver.disconnect();
    var map = {};
    $all("[data-toc]", toc).forEach(function (l) { map[l.getAttribute("data-toc")] = l; });
    spyObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (en.isIntersecting) {
          $all("[data-toc]", toc).forEach(function (l) { l.classList.remove("active"); });
          if (map[en.target.id]) map[en.target.id].classList.add("active");
        }
      });
    }, { rootMargin: "-80px 0px -70% 0px", threshold: 0 });
    heads.forEach(function (h) { spyObserver.observe(h); });
  }

  /* ----- Interakcje w artykule (checklisty, accordiony, taby) ----------- */
  /* ----- Kopiowanie do schowka + toast -------------------------------- */
  function copyText(t) {
    if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(t);
    return new Promise(function (res, rej) {
      try {
        var ta = document.createElement("textarea");
        ta.value = t; ta.setAttribute("readonly", "");
        ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        var ok = document.execCommand("copy");
        document.body.removeChild(ta);
        ok ? res() : rej();
      } catch (e) { rej(e); }
    });
  }
  var toastTimer = null;
  function showToast(msg) {
    var t = document.getElementById("trbk-toast");
    if (!t) { t = document.createElement("div"); t.id = "trbk-toast"; t.className = "toast"; document.body.appendChild(t); }
    t.innerHTML = I.check({ size: 15, sw: 2.4 }) + "<span>" + escapeHtml(msg) + "</span>";
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2000);
  }

  function wireArticleInteractions(roleId, artId) {
    // Checklisty - zaznaczenia NIE są zapisywane (bieżąca kontrola w trakcie pracy).
    $all(".checklist").forEach(function (list) {
      var boxes = $all('input[type="checkbox"]', list);
      var prog = $("[data-progress]", list);
      function refresh() {
        var done = boxes.filter(function (b) { return b.checked; }).length;
        if (prog) prog.textContent = done + "/" + boxes.length;
      }
      boxes.forEach(function (box) { box.addEventListener("change", refresh); });
      refresh();
    });

    // Accordiony
    $all(".acc-head").forEach(function (head) {
      head.addEventListener("click", function () {
        var item = head.closest(".acc-item");
        var open = item.getAttribute("data-open") === "true";
        item.setAttribute("data-open", open ? "false" : "true");
        head.setAttribute("aria-expanded", open ? "false" : "true");
      });
    });

    // Taby
    $all(".tabs").forEach(function (tabs) {
      var btns = $all(".tab-btn", tabs), panels = $all(".tab-panel", tabs);
      btns.forEach(function (btn) {
        btn.addEventListener("click", function () {
          var idx = btn.getAttribute("data-tab");
          btns.forEach(function (b) { b.setAttribute("aria-selected", b === btn ? "true" : "false"); });
          panels.forEach(function (p) { p.hidden = p.getAttribute("data-panel") !== idx; });
        });
        btn.addEventListener("keydown", function (e) {
          var i = btns.indexOf(btn);
          if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
            e.preventDefault();
            var ni = e.key === "ArrowRight" ? (i + 1) % btns.length : (i - 1 + btns.length) % btns.length;
            btns[ni].focus(); btns[ni].click();
          }
        });
      });
    });

    // Druk
    var printBtn = $("[data-print]");
    if (printBtn) printBtn.addEventListener("click", function () { window.print(); });

    // Nagłówki: przycisk udostępniania - kopiuje link do artykułu + toast.
    $all("[data-anchor]").forEach(function (anchor) {
      anchor.addEventListener("click", function (e) {
        e.preventDefault();
        var url = location.href.split("#")[0] + "#/" + roleId + "/" + artId + "#" + anchor.getAttribute("data-anchor");
        copyText(url).then(function () { showToast("Link do sekcji skopiowany"); })
                     .catch(function () { showToast("Nie udało się skopiować"); });
      });
    });
  }

  function setActiveNav(key) {

  function setMeta(text) {
    var m = document.querySelector('meta[name="description"]');
    if (m) m.setAttribute("content", String(text || "").slice(0, 160));
  }
  function readingTime(a) {
    var words = (a.summary || "").split(/\s+/).length + extractText(a.blocks || []).split(/\s+/).length;
    return Math.max(1, Math.round(words / 200));
  }
  function plural(n, one, few, many) {
    if (n === 1) return one;
    var d = n % 10, h = n % 100;
    if (d >= 2 && d <= 4 && (h < 10 || h >= 20)) return few;
    return many;
  }

  /* ====================================================================== *
   *  WYSZUKIWARKA
   * ====================================================================== */
  var searchState = { open: false, hits: [], active: 0 };
  function openSearch() {
    var ov = $("[data-search-overlay]"); if (!ov) return;
    ov.classList.add("open"); searchState.open = true;
    var input = $("[data-search-input]");
    input.value = ""; runSearch("");
    setTimeout(function () { input.focus(); }, 30);
  }
  function closeSearch() {
    var ov = $("[data-search-overlay]"); if (!ov) return;
    ov.classList.remove("open"); searchState.open = false;
  }
  function runSearch(q) {
    var box = $("[data-search-results]");
    var nq = norm(q).trim();
    var tokens = nq.split(/\s+/).filter(Boolean);

    if (!tokens.length) {
      // Stan początkowy: skróty / popularne
      var sugg = (DATA.searchSuggestions || []).map(function (s) {
        return { roleTitle: "Skróty", title: s.title, url: s.href, summary: s.sub || "", _score: 0, _normTitle: norm(s.title), _normBody: norm(s.sub || "") };
      });
      renderHits(sugg, [], "Popularne");
      return;
    }

    var hits = [];
    ARTICLE_INDEX.forEach(function (doc) {
      var nt = norm(doc.title), ns = norm(doc.summary), ntags = norm(doc.tags.join(" ")), nb = norm(doc.body);
      var hay = nt + "  " + ntags + "  " + ns + "  " + nb;
      var ok = true, score = 0;
      tokens.forEach(function (tk) {
        if (hay.indexOf(tk) === -1) { ok = false; return; }
        if (nt.indexOf(tk) !== -1) score += 12;
        if (ntags.indexOf(tk) !== -1) score += 7;
        if (ns.indexOf(tk) !== -1) score += 5;
        var c = nb.split(tk).length - 1; score += Math.min(c, 5) * 2;
        if (nt.indexOf(tk) === 0) score += 6; // prefix tytułu
      });
      if (ok) hits.push({ doc: doc, score: score, nt: nt, nb: nb, ns: ns });
    });
    hits.sort(function (a, b) { return b.score - a.score; });
    renderHits(hits.slice(0, 24).map(function (h) {
      return { roleTitle: h.doc.roleTitle, title: h.doc.title, url: h.doc.url, summary: h.doc.summary, body: h.doc.body, _normTitle: h.nt, _normBody: h.nb, _normSum: h.ns };
    }), tokens, null);
  }

  function renderHits(hits, tokens, groupLabelOverride) {
    var box = $("[data-search-results]");
    searchState.hits = hits; searchState.active = 0;
    if (!hits.length) {
      box.innerHTML = '<div class="search-empty">Brak wyników. Spróbuj innego hasła, np. <strong>materiały</strong>, <strong>rynek wtórny</strong>, <strong>raport</strong>.</div>';
      return;
    }
    // Grupowanie wg roli
    var groups = [], order = [];
    hits.forEach(function (h) {
      var g = groupLabelOverride || h.roleTitle;
      if (order.indexOf(g) === -1) { order.push(g); groups[g] = []; }
      groups[g].push(h);
    });
    var idx = 0, html = "";
    order.forEach(function (g) {
      html += '<div class="search-group"><div class="search-group__label">' + escapeHtml(g) + "</div>";
      groups[g].forEach(function (h) {
        h._i = idx;
        var titleHTML = tokens && tokens.length ? highlight(h.title, h._normTitle || norm(h.title), tokens) : escapeHtml(h.title);
        var snip = makeSnippet(h, tokens);
        html += '<a class="search-hit' + (idx === 0 ? " active" : "") + '" href="' + escapeHtml(h.url) + '" data-hit="' + idx + '">' +
          '<div class="search-hit__top"><span class="search-hit__title">' + titleHTML + "</span>" +
          '<span class="search-hit__badge">' + escapeHtml(h.roleTitle) + "</span></div>" +
          (snip ? '<div class="search-hit__snippet">' + snip + "</div>" : "") + "</a>";
        idx++;
      });
      html += "</div>";
    });
    box.innerHTML = html;

    $all(".search-hit", box).forEach(function (el) {
      el.addEventListener("mouseenter", function () { setActiveHit(parseInt(el.getAttribute("data-hit"), 10)); });
      el.addEventListener("click", function (e) { e.preventDefault(); go(el.getAttribute("href")); closeSearch(); });
    });
  }
  function makeSnippet(h, tokens) {
    var body = h.summary || h.body || "";
    if (!body) return tokens && tokens.length ? "" : escapeHtml(h.summary || "");
    if (!tokens || !tokens.length) return escapeHtml(body.slice(0, 120));
    var nb = norm(body), pos = -1;
    for (var i = 0; i < tokens.length; i++) { var p = nb.indexOf(tokens[i]); if (p !== -1 && (pos === -1 || p < pos)) pos = p; }
    var start = 0, prefix = "";
    if (pos > 48) { start = pos - 40; prefix = "… "; }
    var slice = body.slice(start, start + 150);
    return prefix + highlight(slice, norm(slice), tokens) + (start + 150 < body.length ? " …" : "");
  }
  function highlight(orig, normLower, tokens) {
    var ranges = [];
    tokens.forEach(function (t) {
      if (!t) return; var i = 0, p;
      while ((p = normLower.indexOf(t, i)) !== -1) { ranges.push([p, p + t.length]); i = p + t.length; }
    });
    if (!ranges.length) return escapeHtml(orig);
    ranges.sort(function (a, b) { return a[0] - b[0]; });
    var merged = [];
    ranges.forEach(function (r) {
      var last = merged[merged.length - 1];
      if (last && r[0] <= last[1]) last[1] = Math.max(last[1], r[1]); else merged.push([r[0], r[1]]);
    });
    var out = "", pos = 0;
    merged.forEach(function (r) {
      out += escapeHtml(orig.slice(pos, r[0])) + "<mark>" + escapeHtml(orig.slice(r[0], r[1])) + "</mark>";
      pos = r[1];
    });
    out += escapeHtml(orig.slice(pos));
    return out;
  }
  function setActiveHit(i) {
    var box = $("[data-search-results]");
    var hits = $all(".search-hit", box);
    if (!hits.length) return;
    i = Math.max(0, Math.min(i, hits.length - 1));
    searchState.active = i;
    hits.forEach(function (el, k) { el.classList.toggle("active", k === i); });
    var el = hits[i]; if (el) el.scrollIntoView({ block: "nearest" });
  }

  /* ====================================================================== *
   *  ROUTING
   * ====================================================================== */
  function parseHash() {
    var h = (location.hash || "").replace(/^#\/?/, "");
    h = h.split("#")[0]; // odetnij ewentualną kotwicę sekcji
    var parts = h.split("/").filter(Boolean);
    return parts;
  }
  function sectionFromHash() {
    // Format linku do sekcji: #/rola/artykul#idSekcji
    var parts = (location.hash || "").split("#"); // ["", "/rola/artykul", "idSekcji"?]
    return parts.length > 2 ? decodeURIComponent(parts[2]) : "";
  }
  function scrollToSection(id) {
    if (!id) return;
    var el = document.getElementById(id);
    if (!el) return;
    // renderArticle przewinął na górę - teraz skacz do sekcji (offset: scroll-margin-top).
    try { el.scrollIntoView({ block: "start" }); } catch (e) { el.scrollIntoView(); }
  }
  function route() {
    var parts = parseHash();
    if (parts.length === 0) return renderHome();
    var roleId = parts[0], artId = parts[1];
    var role = ROLE_BY_ID[roleId];
    if (!role || role.soon) return render404();
    if (!artId) {
      var first = (FLAT_BY_ROLE[roleId] || [])[0];
      if (first) { location.replace("#/" + roleId + "/" + first.id); return; }
      return render404();
    }
    var ctx = findArticle(roleId, artId);
    if (!ctx) return render404();
    // upewnij się, że rola jest rozwinięta w nawigacji
    var roleEl = $('.nav-role[data-role="' + roleId + '"]');
    if (roleEl) { roleEl.setAttribute("data-open", "true"); var hd = $(".nav-role__head", roleEl); if (hd) hd.setAttribute("aria-expanded", "true"); }
    renderArticle(ctx);
    closeMobileNav();
    scrollToSection(sectionFromHash());
  }
  function go(href) { if (location.hash === href) route(); else location.hash = href; }

  /* ====================================================================== *
   *  Motyw, mobile nav, zdarzenia globalne
   * ====================================================================== */
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    var btn = $("[data-theme-toggle]");
    if (btn) btn.innerHTML = t === "dark" ? I.moon({ size: 19 }) : I.sun({ size: 19 });
    var tc = document.querySelector('meta[name="theme-color"]');
  }
  function initTheme() {
    var saved = LS.get("trbk-theme");
    var t = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(t);
  }
  function toggleTheme() {
    var cur = document.documentElement.getAttribute("data-theme");
    var t = cur === "dark" ? "light" : "dark";
    applyTheme(t); LS.set("trbk-theme", t);
  }
  function openMobileNav() {
    $("#sidebar").classList.add("open");
    $("[data-scrim]").classList.add("show");
    var b = $("[data-burger]"); if (b) b.setAttribute("aria-expanded", "true");
    document.body.style.overflow = "hidden";
  }
  function closeMobileNav() {
    var sb = $("#sidebar"); if (sb) sb.classList.remove("open");
    var sc = $("[data-scrim]"); if (sc) sc.classList.remove("show");
    var b = $("[data-burger]"); if (b) b.setAttribute("aria-expanded", "false");
    document.body.style.overflow = "";
  }

  function bindEvents() {
    document.addEventListener("click", function (e) {
      var t = e.target;
      if (t.closest("[data-search-open]")) { e.preventDefault(); openSearch(); return; }
      if (t.closest("[data-search-close]")) { closeSearch(); return; }
      if (t.closest("[data-theme-toggle]")) { toggleTheme(); return; }
      if (t.closest("[data-burger]")) { var sb = $("#sidebar"); sb.classList.contains("open") ? closeMobileNav() : openMobileNav(); return; }
      if (t.closest("[data-scrim]")) { closeMobileNav(); return; }
      var roleToggle = t.closest("[data-role-toggle]");
      if (roleToggle) {
        var roleEl = roleToggle.closest(".nav-role");
        var open = roleEl.getAttribute("data-open") === "true";
        roleEl.setAttribute("data-open", open ? "false" : "true");
        roleToggle.setAttribute("aria-expanded", open ? "false" : "true");
        return;
      }
      var navLink = t.closest(".nav-link");
      if (navLink && window.innerWidth <= 920) { setTimeout(closeMobileNav, 120); }
      // klik w overlay (poza modalem) zamyka
      if (t.hasAttribute("data-search-overlay")) { closeSearch(); }
    });

    // Wyszukiwarka: input + klawiatura
    var input = $("[data-search-input]");
    if (input) input.addEventListener("input", function () { runSearch(input.value); });

    document.addEventListener("keydown", function (e) {
      var isMeta = e.metaKey || e.ctrlKey;
      if (isMeta && (e.key === "k" || e.key === "K")) { e.preventDefault(); searchState.open ? closeSearch() : openSearch(); return; }
      if (e.key === "/" && !searchState.open && !/^(input|textarea)$/i.test((e.target.tagName || "")) && !e.target.isContentEditable) { e.preventDefault(); openSearch(); return; }
      if (!searchState.open) { if (e.key === "Escape") closeMobileNav(); return; }
      if (e.key === "Escape") { e.preventDefault(); closeSearch(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); setActiveHit(searchState.active + 1); }
      else if (e.key === "ArrowUp") { e.preventDefault(); setActiveHit(searchState.active - 1); }
      else if (e.key === "Enter") {
        var hits = $all(".search-hit");
        var el = hits[searchState.active];
        if (el) { e.preventDefault(); go(el.getAttribute("href")); closeSearch(); }
      }
    });

    window.addEventListener("hashchange", route);
    window.addEventListener("resize", function () { if (window.innerWidth > 920) closeMobileNav(); });
  }

  /* ====================================================================== *
   *  START
   * ====================================================================== */
  function boot() {
    buildShell();
    initTheme();
    bindEvents();
    route();
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

  </script>
</body>
</html>
